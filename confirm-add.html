<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>Success | ScotiaInvested+</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="assets/mockup.css" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#bf000f",
          "background": "#f9f9f9",
          "surface": "#ffffff"
        }
      }
    }
  }
</script>
<style>
  .success-check { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes scaleIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .celebration-bg {
    background: radial-gradient(circle at center, rgba(191,0,15,0.05) 0%, transparent 70%);
  }
</style>
</head>
<body class="bg-background text-on-background min-h-screen font-sans with-mockup">
<div class="iphone-x">
  <div class="notch"></div>
  <div class="screen overflow-hidden flex flex-col bg-white celebration-bg">
    
    <main class="flex-grow flex flex-col items-center justify-center px-10 text-center">
      <div class="w-24 h-24 bg-primary rounded-full flex items-center justify-center mb-8 success-check shadow-xl shadow-primary/20">
        <span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">check</span>
      </div>
      
      <h1 class="text-3xl font-extrabold text-on-background mb-4">You're all set!</h1>
      <p class="text-secondary leading-relaxed mb-10">
        Vanguard S&amp;P 500 Index ETF (VFV) has been added to your <span class="font-bold text-primary">Home Buying</span> roadmap.
      </p>

      <div class="w-full space-y-4">
        <button class="w-full bg-primary text-white py-4 rounded-xl font-bold hover:brightness-110 active:scale-95 transition-all shadow-lg" onclick="location.href='portfolio.html'">
          Go to My Portfolio
        </button>
        <button class="w-full py-4 rounded-xl font-bold text-secondary hover:bg-gray-50 active:scale-95 transition-all" onclick="location.href='index.html'">
          Return Home
        </button>
      </div>
    </main>

    <div class="home-bar"></div>
  </div>
</div>
</body>
</html>
