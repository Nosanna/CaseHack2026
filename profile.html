<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport">
<title>My Profile | ScotiaInvested+</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="assets/mockup.css" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#bf000f",
          "background": "#f9f9f9",
          "surface": "#ffffff"
        }
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background text-on-background min-h-screen font-sans with-mockup">
<div class="iphone-x">
  <div class="notch"></div>
  <div class="screen overflow-hidden flex flex-col bg-white">
    <header class="w-full px-5 py-4 flex justify-between items-center border-b">
       <span class="font-bold text-lg">Account Profile</span>
       <button class="p-2"><span class="material-symbols-outlined">settings</span></button>
    </header>

    <main class="flex-grow overflow-y-auto px-5 py-8 text-center pb-32">
      <div class="w-24 h-24 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-4 border-2 border-primary/20">
        <span class="material-symbols-outlined text-primary text-5xl">person</span>
      </div>
      <h2 class="text-2xl font-extrabold mb-1">Alex Chen</h2>
      <p class="text-secondary text-sm mb-8">Scotia iTRADE Premium Client</p>

      <section class="text-left space-y-3">
        <div class="p-4 rounded-xl border flex items-center justify-between hover:bg-gray-50 cursor-pointer">
          <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-secondary">security</span>
            <span class="font-bold text-sm">Security & Privacy</span>
          </div>
          <span class="material-symbols-outlined text-secondary">chevron_right</span>
        </div>
        <div class="p-4 rounded-xl border flex items-center justify-between hover:bg-gray-50 cursor-pointer" onclick="location.href='adjustment.html'">
          <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-secondary">tune</span>
            <span class="font-bold text-sm">Investor Preferences</span>
          </div>
          <span class="material-symbols-outlined text-secondary">chevron_right</span>
        </div>
        <div class="p-4 rounded-xl border flex items-center justify-between hover:bg-gray-50 cursor-pointer">
          <div class="flex items-center gap-4">
            <span class="material-symbols-outlined text-secondary">description</span>
            <span class="font-bold text-sm">Documents & Tax</span>
          </div>
          <span class="material-symbols-outlined text-secondary">chevron_right</span>
        </div>
      </section>

      <button class="w-full mt-12 py-4 text-primary font-bold border border-primary rounded-xl hover:bg-primary/5">
        Switch Account
      </button>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed-bottom left-0 w-full z-50 bg-white border-t py-2">
      <div class="flex justify-around items-center max-w-md mx-auto">
        <a href="index.html" class="flex flex-col items-center p-2 text-secondary">
          <span class="material-symbols-outlined">home</span>
          <span class="text-[10px]">Home</span>
        </a>
        <a href="portfolio.html" class="flex flex-col items-center p-2 text-secondary">
          <span class="material-symbols-outlined">account_balance_wallet</span>
          <span class="text-[10px]">Accounts</span>
        </a>
        <a href="portfolio.html" class="flex flex-col items-center p-2 text-secondary">
          <span class="material-symbols-outlined">trending_up</span>
          <span class="text-[10px]">Invest</span>
        </a>
        <a href="adjustment.html" class="flex flex-col items-center p-2 text-secondary">
          <span class="material-symbols-outlined">lightbulb</span>
          <span class="text-[10px]">Insights</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center p-2 text-primary font-bold">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
          <span class="text-[10px]">Profile</span>
        </a>
      </div>
    </nav>

    <div class="home-bar"></div>
  </div>
</div>
</body>
</html>
